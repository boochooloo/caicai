<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Boochoo Menu | 啵啵菜单</title>
    <style>
        /* Base Reset */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #fff5eb;
            color: #4a3728;
            overflow-x: hidden;
        }

        /* --- 1. WELCOME GREETING SCREEN --- */
        #welcome-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            /* CHANGED TO YOUR UPDATED FILENAME BELOW */
            background: #fff5eb url('start_screen.jpg') no-repeat center center;
            background-size: cover;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 0.6s ease, transform 0.6s ease;
        }

        /* Overlaying the actual button cleanly over the image button graphics */
        .enter-btn-overlay {
            position: absolute;
            top: 60%; 
            background: #8bc34a;
            color: white;
            border: 4px solid #fff;
            padding: 12px 40px;
            font-size: 1.8rem;
            font-weight: bold;
            border-radius: 20px;
            cursor: pointer;
            box-shadow: 0 8px 0 #689f38, 0 15px 20px rgba(0,0,0,0.2);
            text-align: center;
            line-height: 1.2;
            text-shadow: 2px 2px 0px rgba(0,0,0,0.2);
            font-family: 'Arial Black', Impact, sans-serif;
            letter-spacing: 1px;
            transition: all 0.1s ease;
            animation: bounce 2s infinite;
        }

        .enter-btn-overlay span {
            display: block;
            font-size: 0.9rem;
            font-weight: normal;
            margin-top: 2px;
            font-family: sans-serif;
        }

        .enter-btn-overlay:hover {
            transform: scale(1.05);
            background: #9ccc65;
        }

        .enter-btn-overlay:active {
            transform: translateY(6px) scale(0.98);
            box-shadow: 0 2px 0 #689f38, 0 5px 10px rgba(0,0,0,0.2);
        }

        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% { transform: translateY(0); }
            40% { transform: translateY(-10px); }
            60% { transform: translateY(-5px); }
        }

        .hidden-screen {
            opacity: 0;
            pointer-events: none;
            transform: scale(1.05);
        }

        /* --- 2. ORDERING MENU INTERFACE --- */
        .menu-container {
            max-width: 650px;
            margin: 30px auto;
            background: white;
            padding: 25px;
            border-radius: 24px;
            border: 6px solid #ffd1a4;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 3px dashed #ffd1a4;
            padding-bottom: 20px;
            margin-bottom: 25px;
        }

        h2 {
            font-size: 1.8rem;
            color: #ff8c21;
        }

        .lang-btn {
            background: #ff8c21;
            color: white;
            border: none;
            padding: 8px 18px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 0 4px 0 #d46a00;
        }
        .lang-btn:active {
            transform: translateY(2px);
            box-shadow: 0 2px 0 #d46a00;
        }

        .menu-item {
            display: flex;
            gap: 20px;
            margin-bottom: 25px;
            padding-bottom: 25px;
            border-bottom: 1px solid #ffeada;
            align-items: center;
        }

        .menu-img {
            width: 100px;
            height: 100px;
            background-color: #ffeada;
            border-radius: 16px;
            object-fit: cover;
            border: 3px solid #ffd1a4;
        }

        .menu-details {
            flex: 1;
        }

        .menu-details h3 {
            margin-bottom: 6px;
            font-size: 1.2rem;
            color: #333;
        }

        .menu-details p {
            font-size: 0.95rem;
            color: #777;
            line-height: 1.4;
        }

        .controls {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .btn-qty {
            background: #ffeedf;
            border: 2px solid #ffd1a4;
            color: #ff8c21;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            cursor: pointer;
            font-weight: bold;
            font-size: 1.3rem;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .btn-qty:hover { background: #ffd1a4; }

        .qty-num {
            font-weight: bold;
            font-size: 1.2rem;
            min-width: 20px;
            text-align: center;
        }

        .footer-action {
            margin-top: 35px;
        }

        .btn-order {
            background: #8bc34a;
            color: white;
            border: none;
            padding: 18px;
            font-size: 1.3rem;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
            width: 100%;
            box-shadow: 0 6px 0 #689f38;
            text-shadow: 1px 1px 0 rgba(0,0,0,0.1);
        }

        .btn-order:active {
            transform: translateY(4px);
            box-shadow: 0 2px 0 #689f38;
        }

        /* --- 3. PRINT TICKET LAYOUT --- */
        @media print {
            body { background: white; padding: 0; color: black; }
            #welcome-screen, header, .lang-btn, .controls, .footer-action, .menu-img { display: none !important; }
            .menu-container { border: none; box-shadow: none; padding: 0; max-width: 100%; }
            .menu-item { border-bottom: 1px dashed #000; padding: 12px 0; margin: 0; }
            .menu-item:not(.has-qty) { display: none !important; }
            .print-header { display: block !important; text-align: center; margin-bottom: 20px; border-bottom: 2px solid #000; padding-bottom: 10px; }
            .print-qty { display: inline-block !important; font-weight: bold; margin-right: 15px; font-size: 1.3rem; }
        }
        .print-header, .print-qty { display: none; }
    </style>
</head>
<body>

    <!-- Greeting Start Screen Backdrop -->
    <div id="welcome-screen">
        <button class="enter-btn-overlay" onclick="enterSite()">
            ENTER
            <span>点击进入</span>
        </button>
    </div>

    <!-- Main App Content -->
    <div class="menu-container">
        
        <div class="print-header">
            <h2>Boochoo Order List / 订单明细</h2>
            <p id="print-date"></p>
        </div>

        <header>
            <h2 id="main-title">Boochoo Menu</h2>
            <button class="lang-btn" onclick="toggleLanguage()" id="lang-toggle">中文</button>
        </header>

        <div id="menu-items-wrapper">
            <!-- Dish 1 -->
            <div class="menu-item" id="item-1">
                <img src="dish1.png" alt="Dish" class="menu-img" onerror="this.style.opacity='0';">
                <div class="menu-details">
                    <span class="print-qty" id="p-qty-1"></span>
                    <h3 class="item-name" data-en="Signature Boochoo Bao" data-zh="招牌 Boochoo 包子">Signature Boochoo Bao</h3>
                    <p class="item-desc" data-en="Steamed fluffy buns filled with delicious fillings." data-zh="松软可口的面皮包裹着美味鲜嫩的馅料。">Steamed fluffy buns filled with delicious fillings.</p>
                </div>
                <div class="controls">
                    <button class="btn-qty" onclick="changeQty(1, -1)">-</button>
                    <span class="qty-num" id="qty-1">0</span>
                    <button class="btn-qty" onclick="changeQty(1, 1)">+</button>
                </div>
            </div>

            <!-- Dish 2 -->
            <div class="menu-item" id="item-2">
                <img src="dish2.png" alt="Dish" class="menu-img" onerror="this.style.opacity='0';">
                <div class="menu-details">
                    <span class="print-qty" id="p-qty-2"></span>
                    <h3 class="item-name" data-en="Boochoo Special Bubble Tea" data-zh="Boochoo 特调啵啵奶茶">Boochoo Special Bubble Tea</h3>
                    <p class="item-desc" data-en="Creamy classic house milk tea complete with brown sugar boba pearls." data-zh="香浓经典手调奶茶，配上Q弹黑糖啵啵明珠。">Creamy classic house milk tea complete with brown sugar boba pearls.</p>
                </div>
                <div class="controls">
                    <button class="btn-qty" onclick="changeQty(2, -1)">-</button>
                    <span class="qty-num" id="qty-2">0</span>
                    <button class="btn-qty" onclick="changeQty(2, 1)">+</button>
                </div>
            </div>
        </div>

        <div class="footer-action">
            <button class="btn-order" onclick="printReceipt()" id="order-btn">Hit Order & Print Menu</button>
        </div>
    </div>

    <script>
        function enterSite() {
            document.getElementById('welcome-screen').classList.add('hidden-screen');
        }

        let currentLang = 'en';
        const itemQuantities = { 1: 0, 2: 0 };

        function toggleLanguage() {
            currentLang = currentLang === 'en' ? 'zh' : 'en';
            
            document.getElementById('main-title').innerText = currentLang === 'en' ? 'Boochoo Menu' : 'Boochoo 啵啵菜单';
            document.getElementById('lang-toggle').innerText = currentLang === 'en' ? '中文' : 'English';
            document.getElementById('order-btn').innerText = currentLang === 'en' ? 'Hit Order & Print Menu' : '确认订单并打印菜单';

            document.querySelectorAll('.menu-item').forEach(item => {
                const nameNode = item.querySelector('.item-name');
                const descNode = item.querySelector('.item-desc');
                nameNode.innerText = nameNode.getAttribute(`data-${currentLang}`);
                descNode.innerText = descNode.getAttribute(`data-${currentLang}`);
            });
        }

        function changeQty(itemId, amount) {
            let revisedQty = itemQuantities[itemId] + amount;
            if (revisedQty < 0) revisedQty = 0;
            
            itemQuantities[itemId] = revisedQty;
            document.getElementById(`qty-${itemId}`).innerText = revisedQty;
            
            const targetRow = document.getElementById(`item-${itemId}`);
            const printCounter = document.getElementById(`p-qty-${itemId}`);
            
            if (revisedQty > 0) {
                targetRow.classList.add('has-qty');
                printCounter.innerText = `[x${revisedQty}]`;
            } else {
                targetRow.classList.remove('has-qty');
                printCounter.innerText = '';
            }
        }

        function printReceipt() {
            const grandTotal = Object.values(itemQuantities).reduce((acc, qty) => acc + qty, 0);
            if (grandTotal === 0) {
                alert(currentLang === 'en' ? "Your selection layout is empty!" : "您尚未勾选任何菜单选项！");
                return;
            }

            document.getElementById('print-date').innerText = new Date().toLocaleString();
            window.print();
        }
    </script>
</body>
</html>
